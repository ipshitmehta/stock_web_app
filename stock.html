<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Details | StockPulse</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark app-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">StockPulse</a>
    <a class="btn btn-success" href="index.html">Home</a>
  </div>
</nav>

<section class="container my-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 id="stockName">Apple Inc.</h1>
      <p class="stock-symbol" id="stockSymbol">AAPL</p>
    </div>

    <div class="text-end">
      <h2 id="stockPrice">$192.30</h2>
      <p class="positive" id="stockChange">+1.24%</p>
    </div>
  </div>

  <div class="market-card mb-4">
    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-outline-light btn-sm" onclick="updateChart('1D')">1D</button>
      <button class="btn btn-outline-light btn-sm" onclick="updateChart('1M')">1M</button>
      <button class="btn btn-outline-light btn-sm" onclick="updateChart('3M')">3M</button>
      <button class="btn btn-outline-light btn-sm" onclick="updateChart('1Y')">1Y</button>
    </div>

    <canvas id="stockChart"></canvas>
  </div>

  <div class="market-card">
    <h3>Key Information</h3>

    <table class="table table-dark table-striped mt-3">
      <tbody>
        <tr>
          <td>Company</td>
          <td>Apple Inc.</td>
        </tr>
        <tr>
          <td>Symbol</td>
          <td>AAPL</td>
        </tr>
        <tr>
          <td>Market</td>
          <td>NASDAQ</td>
        </tr>
        <tr>
          <td>Currency</td>
          <td>USD</td>
        </tr>
      </tbody>
    </table>
  </div>

</section>

<footer class="app-footer">
  <p>© 2026 StockPulse. Frontend Programming Project.</p>
</footer>

<script src="js/api.js"></script>
<script src="js/stock.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/stock.js"></script>
</body>
</html>
